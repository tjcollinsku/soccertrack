        schema:
          type: integer
        description: A unique integer value identifying this team.
        required: true
      tags:
      - teams
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
components:
  schemas:
    EndGameRequest:
      type: object
      properties:
        final_time:
          type: string
      required:
      - final_time
    EndGameResponse:
      type: object
      properties:
        detail:
          type: string
        closed:
          type: integer
      required:
      - closed
      - detail
    Game:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        team:
          type: integer
        date:
          type: string
          format: date
        opponent:
          type: string
          maxLength: 100
        location:
          $ref: '#/components/schemas/LocationEnum'
      required:
      - date
      - id
      - opponent
      - team
    GameStatsResponse:
      type: object
      properties:
        game_id:
          type: integer
        players:
          type: array
          items: {}
      required:
      - game_id
      - players
    LineupEntry:
      type: object
      properties:
        player_id:
          type: integer
        position:
          $ref: '#/components/schemas/PositionEnum'
      required:
      - player_id
      - position
    LineupResponse:
      type: object
      properties:
        on_field:
          type: array
          items:
            $ref: '#/components/schemas/PlayerGameSlot'
        bench:
          type: array
          items:
            $ref: '#/components/schemas/Player'
      required:
      - bench
      - on_field
    LocationEnum:
      enum:
      - home
      - away
      type: string
      description: |-
        * `home` - Home
        * `away` - Away
    MoveResponse:
      type: object
      properties:
        current_slot:
          allOf:
          - $ref: '#/components/schemas/PlayerGameSlot'
          nullable: true
      required:
      - current_slot
    MoveSlot:
      type: object
      description: Input for POST /api/slots/move/. Wraps PlayerGameSlot.move_player.
