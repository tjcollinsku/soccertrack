          type: string
          maxLength: 100
        location:
          $ref: '#/components/schemas/LocationEnum'
    PatchedPlayer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        team:
          type: integer
        name:
          type: string
          maxLength: 100
        jersey_number:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
    PatchedPlayerGameSlot:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        game:
          type: integer
        player:
          allOf:
          - $ref: '#/components/schemas/Player'
          readOnly: true
        player_id:
