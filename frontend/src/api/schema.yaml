      - CB2
      - RB
      - LM
      - CM
      - RM
      - LW
      - ST
      - RW
      type: string
      description: |-
        * `GK` - Goalkeeper
        * `LB` - Left Back
        * `CB1` - Center Back (Left)
        * `CB2` - Center Back (Right)
        * `RB` - Right Back
        * `LM` - Left Mid
