        game:
          type: integer
        player:
          type: integer
        new_position:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/NewPositionEnum'
          - $ref: '#/components/schemas/NullEnum'
        at_time:
          type: string
      required:
      - at_time
      - game
      - player
    NewPositionEnum:
      enum:
      - GK
      - LB
      - CB1
      - CB2
      - RB
      - LM
      - CM
      - RM
      - LW
      - ST
      - RW
      type: string
      description: |-
        * `GK` - Goalkeeper
        * `LB` - Left Back
        * `CB1` - Center Back (Left)
        * `CB2` - Center Back (Right)
        * `RB` - Right Back
        * `LM` - Left Mid
        * `CM` - Center Mid
        * `RM` - Right Mid
        * `LW` - Left Wing
        * `ST` - Striker
        * `RW` - Right Wing
    NullEnum:
