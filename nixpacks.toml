[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  "cd frontend && npm install && cd .."
]

[phases.build]
cmds = [
  "cd frontend && npm run build && cd .."
]

[start]
cmd = ". /opt/venv/bin/activate && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn soccertrack.wsgi --bind 0.0.0.0:$PORT"
